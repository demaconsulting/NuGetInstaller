---
# Software Unit Requirements for the Context Unit
#
# The Context unit is responsible for command-line argument parsing and
# controlling tool output (console, log file, and silent mode).

sections:
  - title: Context Unit Requirements
    requirements:
      - id: NuGetInstaller-Context-ArgumentParsing
        title: The Context class shall parse command-line arguments into structured properties.
        justification: |
          Provides a standardized approach to command-line argument parsing and output
          handling across all DEMA Consulting DotNet Tools.
        tests:
          - Context_Create_NoArguments_ReturnsDefaultContext
          - Context_Create_VersionFlag_SetsVersionTrue
          - Context_Create_ShortVersionFlag_SetsVersionTrue
          - Context_Create_HelpFlag_SetsHelpTrue
          - Context_Create_ShortHelpFlag_H_SetsHelpTrue
          - Context_Create_ShortHelpFlag_Question_SetsHelpTrue
          - Context_Create_SilentFlag_SetsSilentTrue
          - Context_Create_ValidateFlag_SetsValidateTrue
          - Context_Create_ResultsFlag_SetsResultsFile
          - Context_Create_LogFlag_OpensLogFile
          - Context_Create_ResultAliasFlag_SetsResultsFile
          - Context_Create_DepthFlag_SetsHeadingDepth
          - Context_Create_NoDepthFlag_ReturnsDefaultHeadingDepth
          - Context_Create_PositionalArgument_SetsPackagesConfigFile
          - Context_Create_ExcludeVersionShortFlag_SetsExcludeVersionTrue
          - Context_Create_ExcludeVersionLongFlag_SetsExcludeVersionTrue
          - Context_Create_OutputDirectoryShortFlag_SetsOutputDirectory
          - Context_Create_OutputDirectoryLongFlag_SetsOutputDirectory
          - Context_Create_AllNewArguments_SetsAllProperties

      - id: NuGetInstaller-Context-InvalidArgs
        title: The Context class shall reject unknown or malformed command-line arguments with a descriptive error.
        justification: |
          Providing clear feedback for invalid arguments helps users quickly correct
          mistakes and prevents silent misconfiguration.
        tests:
          - Context_Create_UnknownArgument_ThrowsArgumentException
          - Context_Create_LogFlag_WithoutValue_ThrowsArgumentException
          - Context_Create_ResultsFlag_WithoutValue_ThrowsArgumentException
          - Context_Create_ResultAliasFlag_WithoutValue_ThrowsArgumentException
          - Context_Create_DepthFlag_WithoutValue_ThrowsArgumentException
          - Context_Create_DepthFlag_NonIntegerValue_ThrowsArgumentException
          - Context_Create_DepthFlag_ZeroValue_ThrowsArgumentException
          - Context_Create_DepthFlag_ExceedsMaxValue_ThrowsArgumentException
          - Context_Create_OutputDirectoryFlag_WithoutValue_ThrowsArgumentException

      - id: NuGetInstaller-Context-ConsoleOutput
        title: The Context class shall write output to the console unless the silent flag is set.
        justification: |
          Provides a standardized output channel for all tool subsystems, ensuring
          consistent console output behavior controlled by the silent flag.
        tests:
          - Context_WriteLine_NotSilent_WritesToConsole
          - Context_WriteLine_Silent_DoesNotWriteToConsole

      - id: NuGetInstaller-Context-LogFileOutput
        title: The Context class shall write output to a log file when a log file path is configured.
        justification: |
          Provides persistent logging for debugging and audit trails when the
          --log flag is supplied.
        tests:
          - Context_Create_LogFlag_OpensLogFile
          - Context_WriteError_WritesToLogFile

      - id: NuGetInstaller-Context-Silent
        title: The Context class shall suppress console output when the silent flag is set.
        justification: |
          Enables automated scripts and CI/CD pipelines to run the tool without
          cluttering output logs.
        tests:
          - Context_Create_SilentFlag_SetsSilentTrue
          - Context_WriteLine_Silent_DoesNotWriteToConsole
          - Context_WriteError_Silent_DoesNotWriteToConsole

      - id: NuGetInstaller-Context-ErrorOutput
        title: The Context class shall write error messages to stderr.
        justification: |
          Error messages must be written to stderr so they remain visible to the user
          without polluting stdout, which consumers may pipe or redirect for data capture.
        tests:
          - Context_WriteError_NotSilent_WritesToConsole
          - Context_WriteError_SetsErrorExitCode

      - id: NuGetInstaller-Context-ExitCode
        title: The Context class shall track errors and expose a non-zero exit code when errors have occurred.
        justification: |
          Callers (scripts, CI/CD pipelines) must be able to detect failure conditions
          programmatically via the process exit code.
        tests:
          - Context_WriteError_SetsErrorExitCode
