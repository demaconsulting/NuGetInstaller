---
# Cli Subsystem Requirements
#
# PURPOSE:
# - Define requirements for the NuGetInstaller Cli subsystem
# - The Cli subsystem spans Context.cs (command-line argument parsing and I/O)
# - Subsystem requirements describe the externally visible command-line interface behavior

sections:
  - title: Cli Subsystem Requirements
    requirements:
      - id: NuGetInstaller-Cli-Context
        title: The Cli subsystem shall implement a Context class for command-line argument handling.
        justification: |
          Provides a standardized approach to command-line argument parsing and output
          handling across all DEMA Consulting DotNet Tools. The Context class encapsulates
          all parsed flags and output channels so that the rest of the tool has a single,
          consistent entry point for CLI interaction.
        tests:
          - CliSubsystem_VersionFlow_ContextAndProgram_DisplaysVersionAndExits
          - CliSubsystem_HelpFlow_ContextAndProgram_DisplaysHelpAndExits
          - CliSubsystem_HelpFlow_ContextAndProgram_DisplaysHelpAndExits_WithShortQuestionFlag
          - CliSubsystem_HelpFlow_ContextAndProgram_DisplaysHelpAndExits_WithShortHFlag
          - CliSubsystem_ValidateFlow_ContextAndProgram_RunsValidationAndExits
          - CliSubsystem_SilentFlow_ContextAndProgram_SuppressesOutput

      - id: NuGetInstaller-Cli-Version
        title: The Cli subsystem shall support -v and --version flags to signal version display.
        justification: |
          Users need to quickly identify the version of the tool they are using for
          troubleshooting and compatibility verification.
        tests:
          - CliSubsystem_VersionFlow_ContextAndProgram_DisplaysVersionAndExits
          - CliSubsystem_VersionFlow_ContextAndProgram_DisplaysVersionAndExits_WithShortVFlag

      - id: NuGetInstaller-Cli-Help
        title: The Cli subsystem shall support -?, -h, and --help flags to signal help display.
        justification: |
          Users need access to command-line usage documentation without requiring
          external resources.
        tests:
          - CliSubsystem_HelpFlow_ContextAndProgram_DisplaysHelpAndExits
          - CliSubsystem_HelpFlow_ContextAndProgram_DisplaysHelpAndExits_WithShortQuestionFlag
          - CliSubsystem_HelpFlow_ContextAndProgram_DisplaysHelpAndExits_WithShortHFlag

      - id: NuGetInstaller-Cli-Silent
        title: The Cli subsystem shall support --silent flag to suppress console output.
        justification: |
          Enables automated scripts and CI/CD pipelines to run the tool without
          cluttering output logs.
        tests:
          - CliSubsystem_SilentFlow_ContextAndProgram_SuppressesOutput

      - id: NuGetInstaller-Cli-Validate
        title: The Cli subsystem shall support --validate flag to signal self-validation.
        justification: |
          Provides a built-in mechanism to verify the tool is functioning correctly
          in the deployment environment.
        tests:
          - CliSubsystem_ValidateFlow_ContextAndProgram_RunsValidationAndExits

      - id: NuGetInstaller-Cli-Results
        title: The Cli subsystem shall support --results flag to specify a test results output file.
        justification: |
          Enables integration with CI/CD systems that expect standard test result formats.
        tests:
          - CliSubsystem_ResultsFlow_ContextAndProgram_WritesResultsFile

      - id: NuGetInstaller-Cli-ResultAlias
        title: The Cli subsystem shall support --result as an alias for the --results flag.
        justification: |
          Provides a convenient short-form alias for the results flag, reducing
          typing in interactive use and script files.
        tests:
          - CliSubsystem_ResultAliasFlow_ContextAndProgram_WritesResultsFile

      - id: NuGetInstaller-Cli-Depth
        title: The Cli subsystem shall support --depth flag to control the heading depth of markdown output.
        justification: |
          Enables validation output to be embedded within larger markdown documents at
          the appropriate heading level, supporting documentation workflows that combine
          multiple reports.
        tests:
          - CliSubsystem_DepthFlow_ContextAndProgram_AdjustsHeadingDepth

      - id: NuGetInstaller-Cli-Log
        title: The Cli subsystem shall support --log flag to write output to a log file.
        justification: |
          Provides persistent logging for debugging and audit trails.
        tests:
          - CliSubsystem_LogFlow_ContextAndProgram_WritesLogFile

      - id: NuGetInstaller-Cli-ErrorOutput
        title: The Cli subsystem shall write error messages to stderr.
        justification: |
          Error messages must be written to stderr so they remain visible to the user
          without polluting stdout, which consumers may pipe or redirect for data capture.
        tests:
          - CliSubsystem_ErrorOutput_ContextAndProgram_WritesErrorToStderr

      - id: NuGetInstaller-Cli-InvalidArgs
        title: The Cli subsystem shall reject unknown or malformed command-line arguments with a descriptive error.
        justification: |
          Providing clear feedback for invalid arguments helps users quickly correct
          mistakes and prevents silent misconfiguration.
        tests:
          - CliSubsystem_InvalidArgs_ContextAndProgram_RejectsUnknownArgumentsAndExitsNonZero

      - id: NuGetInstaller-Cli-ExitCode
        title: The Cli subsystem shall return a non-zero exit code on failure.
        justification: |
          Callers (scripts, CI/CD pipelines) must be able to detect failure conditions
          programmatically via the process exit code.
        tests:
          - CliSubsystem_InvalidArgs_ContextAndProgram_RejectsUnknownArgumentsAndExitsNonZero

      - id: NuGetInstaller-Cli-PackagesConfig
        title: The Cli subsystem shall accept a positional packages.config argument.
        justification: |
          Users need to specify the path to the packages.config file. A positional
          argument provides a natural and concise syntax matching NuGet.exe conventions.
        tests:
          - CliSubsystem_PackagesConfigFlow_ContextAndProgram_AcceptsPositionalArgument

      - id: NuGetInstaller-Cli-OutputDirectory
        title: The Cli subsystem shall support -o and -OutputDirectory flags to set the output directory.
        justification: |
          Users need to control where packages are extracted. The output directory flag
          allows specifying a custom path, defaulting to the current directory.
        tests:
          - CliSubsystem_OutputDirectoryFlow_ContextAndProgram_SetsOutputDirectory
          - CliSubsystem_OutputDirectoryFlow_ContextAndProgram_SetsOutputDirectory_WithLongFlag

      - id: NuGetInstaller-Cli-ExcludeVersion
        title: The Cli subsystem shall support -x and -ExcludeVersion flags to control folder naming.
        justification: |
          Users may prefer version-less folder naming for simpler path references.
          The exclude version flag changes folder naming from {Id}.{Version}/ to {Id}/.
        tests:
          - CliSubsystem_ExcludeVersionFlow_ContextAndProgram_SetsExcludeVersion
          - CliSubsystem_ExcludeVersionFlow_ContextAndProgram_SetsExcludeVersion_WithLongFlag
