---
# SelfTest Subsystem Requirements
#
# PURPOSE:
# - Define requirements for the NuGetInstaller SelfTest subsystem
# - The SelfTest subsystem spans Validation.cs (self-validation test execution)
# - Subsystem requirements describe the self-validation mechanism for tool qualification
#   in regulated environments

sections:
  - title: SelfTest Subsystem Requirements
    requirements:
      - id: NuGetInstaller-SelfTest-Qualification
        title: The tool shall provide a self-validation mechanism to qualify the tool in its deployment environment.
        justification: |
          In regulated environments, tool qualification evidence is required to demonstrate
          that the tool functions correctly in its deployment environment before it is used
          to generate compliance artifacts. The SelfTest subsystem provides a built-in
          self-validation suite that exercises core behaviors and produces a pass/fail
          summary, enabling quality assurance teams to obtain tool qualification evidence
          without requiring a separate test harness.
        tests:
          - SelfTestSubsystem_ValidationWorkflow_NoResultFiles_CompletesSuccessfully

      - id: NuGetInstaller-SelfTest-TrxOutput
        title: The tool shall write self-validation results to a TRX file when a .trx results path is provided.
        justification: |
          CI/CD pipelines and requirements traceability tools such as ReqStream consume
          TRX (MSTest) format test result files. TRX output enables self-validation results
          to be fed directly into pipeline tooling and traceability reports without additional
          conversion steps, satisfying audit trail requirements.
        tests:
          - SelfTestSubsystem_ValidationWorkflow_WithTrxFile_GeneratesResults

      - id: NuGetInstaller-SelfTest-JUnitOutput
        title: The tool shall write self-validation results to a JUnit XML file when an .xml results path is provided.
        justification: |
          Many CI tools consume JUnit XML format test result files. JUnit output enables
          self-validation results to be fed directly into pipeline tooling and traceability
          reports without additional conversion steps, satisfying audit trail requirements.
        tests:
          - SelfTestSubsystem_ValidationWorkflow_WithJUnitFile_GeneratesResults
          - SelfTestSubsystem_ValidationWorkflow_WithBothResultFiles_GeneratesBothResults
