---
# Software Unit Requirements for the PathHelpers Unit
#
# The PathHelpers unit provides safe path-combination utilities that protect
# against path-traversal attacks.

sections:
  - title: PathHelpers Unit Requirements
    requirements:
      - id: NuGetInstaller-PathHelpers-SafeCombine
        title: The PathHelpers class shall combine paths safely, preventing path traversal.
        justification: |
          Prevents path-traversal vulnerabilities when constructing file paths from
          user-supplied or external inputs. Paths containing ".." or rooted paths
          must be rejected to ensure the combined path remains under the base directory.
        tests:
          - PathHelpers_SafePathCombine_ValidPaths_CombinesCorrectly
          - PathHelpers_SafePathCombine_PathTraversalWithDoubleDots_ThrowsArgumentException
          - PathHelpers_SafePathCombine_DoubleDotsInMiddle_ThrowsArgumentException
          - PathHelpers_SafePathCombine_SlashRootedRelativePath_ThrowsArgumentException
          - windows@PathHelpers_SafePathCombine_WindowsAbsolutePath_ThrowsArgumentException
          - PathHelpers_SafePathCombine_NestedPaths_CombinesCorrectly
          - PathHelpers_SafePathCombine_CurrentDirectoryReference_CombinesCorrectly
          - PathHelpers_SafePathCombine_EmptyRelativePath_ReturnsBasePath
          - PathHelpers_SafePathCombine_DotDotPrefixedName_CombinesCorrectly

      - id: NuGetInstaller-PathHelpers-NullInputRejection
        title: The PathHelpers unit shall reject null path arguments.
        justification: |
          Null arguments must be explicitly rejected to prevent null reference
          exceptions deeper in the call stack and to clearly communicate API
          contract violations to callers.
        tests:
          - PathHelpers_SafePathCombine_NullBasePath_ThrowsArgumentNullException
          - PathHelpers_SafePathCombine_NullRelativePath_ThrowsArgumentNullException
