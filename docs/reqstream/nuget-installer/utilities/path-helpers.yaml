---
# Software Unit Requirements for the PathHelpers Class
#
# The PathHelpers class provides safe path-combination utilities that protect
# against path-traversal attacks by rejecting relative paths containing ".."
# or absolute paths when a relative path is expected.

sections:
  - title: PathHelpers Unit Requirements
    requirements:
      - id: Template-PathHelpers-SafeCombine
        title: The PathHelpers class shall combine paths safely, preventing path traversal.
        justification: |
          Prevents path-traversal vulnerabilities when constructing file paths from
          user-supplied or external inputs. Paths containing ".." or rooted paths
          must be rejected to ensure the combined path remains under the base directory.
        tests:
          - PathHelpers_SafePathCombine_ValidPaths_CombinesCorrectly
          - PathHelpers_SafePathCombine_PathTraversalWithDoubleDots_ThrowsArgumentException
          - PathHelpers_SafePathCombine_DoubleDotsInMiddle_ThrowsArgumentException
          - PathHelpers_SafePathCombine_AbsolutePath_ThrowsArgumentException
          - PathHelpers_SafePathCombine_NestedPaths_CombinesCorrectly

      - id: Template-PathHelpers-SafeCombine-CustomMessage
        title: The PathHelpers class shall throw an InvalidOperationException with a caller-supplied message when a path
          traversal is detected and a custom message is provided.
        justification: |
          Callers such as PackageExtractor need to surface domain-specific error messages
          (e.g. describing a zip-slip attack) when a path traversal is detected. Providing
          an optional message parameter allows the exception type and text to be controlled
          by the caller without duplicating the containment-check logic.
        tests:
          - PathHelpers_SafePathCombine_PathTraversalWithMessage_ThrowsInvalidOperationException
          - PathHelpers_SafePathCombine_ValidPathWithMessage_CombinesCorrectly
