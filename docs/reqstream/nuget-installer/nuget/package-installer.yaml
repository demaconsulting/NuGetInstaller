---
# Software Unit Requirements for the PackageInstaller Class
#
# The PackageInstaller class orchestrates the installation of NuGet packages
# by caching them via NuGetCache and extracting to the output directory.

sections:
  - title: PackageInstaller Unit Requirements
    requirements:
      - id: NuGetInstaller-PackageInstaller-Install
        title: The PackageInstaller class shall install packages by caching and extracting them.
        justification: |
          The installer must coordinate between the NuGet global package cache
          and the local output directory, ensuring each package is resolved from
          the cache before extraction. This two-step process leverages the shared
          NuGet cache to avoid redundant downloads.
        tests:
          - NuGetSubsystem_ReadAndInstallWorkflow_ValidConfig_ReturnsAndInstallsPackages

      - id: NuGetInstaller-PackageInstaller-FolderNamingVersioned
        title: The PackageInstaller class shall use {Id}.{Version}/ folder naming by default.
        justification: |
          The default {Id}.{Version}/ convention matches NuGet.exe behavior and
          allows multiple versions of the same package to coexist side-by-side
          in the output directory.
        tests:
          - NuGetSubsystem_ReadAndInstallWorkflow_ValidConfig_ReturnsAndInstallsPackages

      - id: NuGetInstaller-PackageInstaller-FolderNamingExcludeVersion
        title: The PackageInstaller class shall use {Id}/ folder naming when the excludeVersion flag is true.
        justification: |
          Some build systems reference packages by a version-less folder name.
          When the user passes -ExcludeVersion, the installer must use the simpler
          {Id}/ convention to satisfy those consumers.
        tests:
          - PackageInstaller_InstallAsync_ExcludeVersion_UsesFlatFolderNaming
