---
# Software Unit Requirements for the PackageInstaller Unit
#
# The PackageInstaller unit is responsible for coordinating the installation
# of NuGet packages into the output directory.

sections:
  - title: PackageInstaller Unit Requirements
    requirements:
      - id: NuGetInstaller-PackageInstaller-Install
        title: >-
          The PackageInstaller unit shall install packages from the package
          configuration into the output directory.
        justification: |
          The installer must resolve each package and place its contents in the
          local output directory so that downstream build processes can reference
          the package files directly.
        tests:
          - PackageInstaller_InstallAsync_DefaultNaming_ExtractsPackageToVersionedFolder

      - id: NuGetInstaller-PackageInstaller-FolderNamingVersioned
        title: The PackageInstaller class shall use {Id}.{Version}/ folder naming by default.
        justification: |
          The default {Id}.{Version}/ convention matches NuGet.exe behavior and
          allows multiple versions of the same package to coexist side-by-side
          in the output directory.
        tests:
          - PackageInstaller_InstallAsync_DefaultNaming_ExtractsPackageToVersionedFolder

      - id: NuGetInstaller-PackageInstaller-FolderNamingExcludeVersion
        title: The PackageInstaller class shall use {Id}/ folder naming when the excludeVersion flag is true.
        justification: |
          Some build systems reference packages by a version-less folder name.
          When the user passes -ExcludeVersion, the installer must use the simpler
          {Id}/ convention to satisfy those consumers.
        tests:
          - PackageInstaller_InstallAsync_ExcludeVersion_UsesFlatFolderNaming

      - id: NuGetInstaller-PackageInstaller-CreateOutputDirectory
        title: The PackageInstaller class shall create the output directory if it does not already exist.
        justification: |
          Callers should not need to pre-create the output directory. Creating it
          automatically reduces boilerplate in consuming code and makes the API
          more convenient.
        tests:
          - PackageInstaller_InstallAsync_EmptyPackages_CreatesOutputDirectoryAndSucceeds

      - id: NuGetInstaller-PackageInstaller-StatusMessages
        title: >-
          The PackageInstaller class shall write a status message via the
          context after each package is installed or skipped.
        justification: |
          Users and CI systems need feedback on which packages were newly installed and
          which were skipped because they were already present. Status messages allow
          consumers to distinguish first-time installs from cached-hit operations.
        tests:
          - PackageInstaller_InstallAsync_AlreadyExtracted_SkipsInstallation
