---
# NuGet Subsystem Requirements
#
# PURPOSE:
# - Define requirements for the NuGetInstaller NuGet subsystem
# - Subsystem requirements describe the package reading, caching, and extraction behavior

sections:
  - title: NuGet Subsystem Requirements
    requirements:
      - id: NuGetInstaller-NuGet-ReadConfig
        title: >-
          The NuGet subsystem shall read the package configuration file
          and return the declared package dependencies.
        justification: |
          The NuGet subsystem must parse the package configuration to determine
          which packages and versions to install. This format is the industry-standard
          way to declare NuGet package dependencies for project-level restore scenarios.
        children:
          - NuGetInstaller-PackagesConfigReader-Parse
          - NuGetInstaller-PackagesConfigReader-FileNotFound
          - NuGetInstaller-PackagesConfigReader-MissingAttributes
          - NuGetInstaller-PackagesConfigReader-MalformedXml
        tests:
          - NuGetSubsystem_ReadAndInstallWorkflow_ValidConfig_ReturnsAndInstallsPackages
          - NuGetSubsystem_ConfigReadingWorkflow_ValidPackagesConfig_ReturnsEntries

      - id: NuGetInstaller-NuGet-ExtractPackages
        title: The NuGet subsystem shall extract cached NuGet packages into the output directory.
        justification: |
          After resolving packages from the NuGet cache, the subsystem must extract
          their contents to the user-specified output directory so that downstream
          build processes can reference the package files directly.
        children:
          - NuGetInstaller-PackageExtractor-Extract
          - NuGetInstaller-PackageExtractor-ZipSlip
          - NuGetInstaller-PackageExtractor-ZipBomb
          - NuGetInstaller-PackageExtractor-SkipDirectoryEntries
        tests:
          - NuGetSubsystem_ReadAndInstallWorkflow_ValidConfig_ReturnsAndInstallsPackages
          - NuGetSubsystem_ExtractionWorkflow_ValidPackage_ExtractsToDirectory

      - id: NuGetInstaller-NuGet-SkipExisting
        title: The NuGet subsystem shall skip extraction when the destination folder already exists.
        justification: |
          Incremental builds should not re-extract packages that are already present.
          Skipping existing folders avoids unnecessary I/O and supports idempotent
          installation for CI/CD pipelines that cache the output directory.
        children:
          - NuGetInstaller-PackageExtractor-SkipExisting
        tests:
          - NuGetSubsystem_ExtractionWorkflow_ExistingDestination_SkipsExtraction

      - id: NuGetInstaller-NuGet-ExcludeVersion
        title: The NuGet subsystem shall use version-less folder naming when excludeVersion is true.
        justification: |
          When excludeVersion is enabled, packages are extracted to folders named
          by package Id only (without version suffix), supporting scenarios where
          downstream consumers require stable folder paths across version upgrades.
        children:
          - NuGetInstaller-PackageInstaller-FolderNamingExcludeVersion
        tests:
          - NuGetSubsystem_ReadAndInstallWorkflow_ExcludeVersion_UsesFlatFolderNaming

      - id: NuGetInstaller-NuGet-MissingFile
        title: The NuGet subsystem shall report an error when the package configuration file is not found.
        justification: |
          A clear error when the configuration file is absent prevents silent failures
          and gives callers actionable diagnostic information.
        tests:
          - NuGetSubsystem_MissingFileWorkflow_NonexistentConfig_ThrowsInvalidOperationException

      - id: NuGetInstaller-NuGet-MalformedXml
        title: The NuGet subsystem shall report an error when the package configuration file contains malformed XML.
        justification: |
          A clear error for malformed XML helps users identify and fix configuration
          file issues quickly, rather than encountering an opaque parse failure.
        tests:
          - NuGetSubsystem_MalformedXmlWorkflow_InvalidXml_ThrowsXmlException
