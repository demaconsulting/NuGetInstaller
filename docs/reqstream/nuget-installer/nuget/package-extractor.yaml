---
# Software Unit Requirements for the PackageExtractor Unit
#
# The PackageExtractor unit is responsible for extracting NuGet package
# contents to a destination folder.

sections:
  - title: PackageExtractor Unit Requirements
    requirements:
      - id: NuGetInstaller-PackageExtractor-Extract
        title: The PackageExtractor class shall extract .nupkg file contents to the destination folder.
        justification: |
          NuGet packages are ZIP archives. Extracting them to a local folder makes
          their contents (assemblies, content files) available for downstream
          build processes that reference packages by directory path.
        tests:
          - PackageExtractor_Extract_NewDestination_ExtractsAndReturnsTrue

      - id: NuGetInstaller-PackageExtractor-ZipSlip
        title: The PackageExtractor unit shall reject archive entries that would write files outside the destination folder
          (zip-slip).
        justification: |
          Malicious archives may contain entries with path-traversal sequences (e.g. ../evil.txt)
          designed to write files outside the intended destination. The extractor must detect
          and reject such entries before any file is written to prevent unauthorized file-system
          access.
        tests:
          - PackageExtractor_Extract_ZipSlipEntry_ThrowsInvalidOperationException

      - id: NuGetInstaller-PackageExtractor-SkipExisting
        title: The PackageExtractor class shall skip extraction when the destination folder already exists.
        justification: |
          Idempotent extraction prevents unnecessary I/O during incremental builds
          and avoids overwriting user modifications in the output directory.
        tests:
          - PackageExtractor_Extract_DestinationExists_ReturnsFalse

      - id: NuGetInstaller-PackageExtractor-ZipBomb
        title: The PackageExtractor class shall abort extraction when the total decompressed size exceeds 1 GB.
        justification: |
          Zip-bomb attacks use small compressed archives that expand to enormous sizes.
          A 1 GB limit prevents denial-of-service attacks that could exhaust disk space
          during package extraction.
        tests:
          - PackageExtractor_Extract_ZipBombEntry_ThrowsInvalidOperationException
