---
# Software Unit Requirements for the PackageEntry Unit
#
# The PackageEntry unit represents a single package dependency declared in the
# package configuration file.

sections:
  - title: PackageEntry Unit Requirements
    requirements:
      - id: NuGetInstaller-PackageEntry-DataModel
        title: The PackageEntry unit shall represent a single NuGet package dependency
          with its identifier, version, and optional target framework.
        justification: |
          A strongly typed model is required to pass package metadata between the
          configuration reader and the installer. The identifier and version are
          mandatory to ensure every entry is complete, while the target framework
          remains optional to match the package configuration schema.
        tests:
          - ModelsSubsystem_PackageEntry_AllProperties_StoresCorrectly
          - ModelsSubsystem_PackageEntry_OptionalTargetFramework_IsNullWhenNotSet
