---
# ReviewMark Configuration File
# This file defines which files require review, where the evidence store is located,
# and how files are grouped into named review-sets following software unit boundaries.

# Patterns identifying all files that require review.
# Processed in order; prefix a pattern with '!' to exclude.
needs-review:
  - "README.md"                  # Project readme
  - "**/*.cs"                    # All C# source and test files
  - "requirements.yaml"          # Root requirements file
  - "docs/reqstream/**/*.yaml"   # Requirements files
  - "docs/user_guide/**/*.md"    # User guide documents
  - "docs/design/**/*.md"        # Design documents
  - "!**/obj/**"                 # Exclude build output
  - "!**/bin/**"                 # Exclude build output

# Evidence source: review data and index.json are located in the 'reviews' branch
# of this repository, accessed through the GitHub public HTTPS raw content access.
# Note: The 'reviews' branch must be created and populated with review evidence PDFs
# and an index.json before enforcement (--enforce flag) can be enabled in the pipeline.
evidence-source:
  type: url
  location: https://raw.githubusercontent.com/demaconsulting/NuGetInstaller/reviews/index.json

# Review sets following standardized patterns for hierarchical compliance coverage
reviews:
  # Purpose Review (only one per repository)
  - id: Purpose
    title: Review of user-facing capabilities and system promises
    paths:
      - "README.md"
      - "docs/user_guide/**/*.md"
      - "docs/reqstream/nuget-installer/nuget-installer.yaml"
      - "docs/design/introduction.md"
      - "docs/design/nuget-installer/nuget-installer.md"

  # NuGetInstaller-Architecture Review (one per system)
  - id: NuGetInstaller-Architecture
    title: Review of NuGet Installer system architecture and operational validation
    paths:
      - "docs/reqstream/nuget-installer/nuget-installer.yaml"
      - "docs/design/introduction.md"
      - "docs/design/nuget-installer/nuget-installer.md"
      - "test/**/IntegrationTests.cs"

  # NuGetInstaller-Design Review (one per system)
  - id: NuGetInstaller-Design
    title: Review of NuGet Installer architectural and design consistency
    paths:
      - "docs/reqstream/nuget-installer/nuget-installer.yaml"
      - "docs/reqstream/nuget-installer/platform-requirements.yaml"
      - "docs/design/introduction.md"
      - "docs/design/nuget-installer/**/*.md"

  # NuGetInstaller-AllRequirements Review (one per system)
  - id: NuGetInstaller-AllRequirements
    title: Review of NuGet Installer requirements quality and traceability
    paths:
      - "requirements.yaml"
      - "docs/reqstream/nuget-installer/**/*.yaml"
      - "docs/reqstream/ots/**/*.yaml"

  # NuGetInstaller-Cli Review (one per subsystem)
  - id: NuGetInstaller-Cli
    title: Review of NuGet Installer Cli subsystem architecture and interfaces
    paths:
      - "docs/reqstream/nuget-installer/cli/cli.yaml"
      - "docs/design/nuget-installer/cli/cli.md"
      - "test/**/Cli/CliSubsystemTests.cs"

  # NuGetInstaller-SelfTest Review (one per subsystem)
  - id: NuGetInstaller-SelfTest
    title: Review of NuGet Installer SelfTest subsystem architecture and interfaces
    paths:
      - "docs/reqstream/nuget-installer/self-test/self-test.yaml"
      - "docs/design/nuget-installer/self-test/self-test.md"
      - "test/**/SelfTest/SelfTestSubsystemTests.cs"

  # NuGetInstaller-Utilities Review (one per subsystem)
  - id: NuGetInstaller-Utilities
    title: Review of NuGet Installer Utilities subsystem architecture and interfaces
    paths:
      - "docs/reqstream/nuget-installer/utilities/utilities.yaml"
      - "docs/design/nuget-installer/utilities/utilities.md"
      - "test/**/Utilities/UtilitiesSubsystemTests.cs"

  # NuGetInstaller-Cli-Context Review (one per unit)
  - id: NuGetInstaller-Cli-Context
    title: Review of NuGet Installer Context unit implementation
    paths:
      - "docs/reqstream/nuget-installer/cli/context.yaml"
      - "docs/design/nuget-installer/cli/context.md"
      - "src/**/Cli/Context.cs"
      - "test/**/Cli/ContextTests.cs"

  # NuGetInstaller-Program Review (one per unit)
  - id: NuGetInstaller-Program
    title: Review of NuGet Installer Program unit implementation
    paths:
      - "docs/reqstream/nuget-installer/program.yaml"
      - "docs/design/nuget-installer/program.md"
      - "src/**/Program.cs"
      - "test/**/ProgramTests.cs"

  # NuGetInstaller-SelfTest-Validation Review (one per unit)
  - id: NuGetInstaller-SelfTest-Validation
    title: Review of NuGet Installer Validation unit implementation
    paths:
      - "docs/reqstream/nuget-installer/self-test/validation.yaml"
      - "docs/design/nuget-installer/self-test/validation.md"
      - "src/**/SelfTest/Validation.cs"
      - "test/**/SelfTest/ValidationTests.cs"

  # NuGetInstaller-Utilities-PathHelpers Review (one per unit)
  - id: NuGetInstaller-Utilities-PathHelpers
    title: Review of NuGet Installer PathHelpers unit implementation
    paths:
      - "docs/reqstream/nuget-installer/utilities/path-helpers.yaml"
      - "docs/design/nuget-installer/utilities/path-helpers.md"
      - "src/**/Utilities/PathHelpers.cs"
      - "test/**/Utilities/PathHelpersTests.cs"
