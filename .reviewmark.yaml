---
# ReviewMark Configuration File
# This file defines which files require review, where the evidence store is located,
# and how files are grouped into named review-sets.

# Patterns identifying all files that require review.
# Processed in order; prefix a pattern with '!' to exclude.
needs-review:
  - "README.md"                   # Root README file
  - "requirements.yaml"           # Root requirements file
  - "**/*.cs"                     # All C# source and test files
  - "docs/reqstream/**/*.yaml"    # Requirements files
  - "docs/design/**/*.md"         # Design documentation files
  - "docs/verification/**/*.md"   # Verification documentation files
  - "docs/user_guide/**/*.md"     # User guide documentation
  - "docs/sysml2/**/*.sysml"      # SysML2 architecture model
  - "!**/obj/**"                  # Exclude build output
  - "!**/bin/**"                  # Exclude build output
  - "!node_modules/**"            # Exclude npm dependencies
  - "!**/.venv/**"                # Exclude Python virtual environment

# Evidence source: review data and index.json are located in the 'reviews' branch
# of this repository, accessed through the GitHub public HTTPS raw content access.
# Note: The 'reviews' branch must be created and populated with review evidence PDFs
# and an index.json before enforcement (--enforce flag) can be enabled in the pipeline.
evidence-source:
  type: url
  location: https://raw.githubusercontent.com/demaconsulting/NuGetInstaller/reviews/index.json

# Global context shown to every reviewer for orientation (not fingerprinted).
context:
  - docs/design/introduction.md

# Review sets following standardized patterns for hierarchical compliance coverage
reviews:
  # Purpose Review (only one per repository)
  - id: Purpose
    title: Review that README and User Guide are Coherent and Complete
    context:
      - "!docs/design/introduction.md"                            # exclude design intro from user-facing review
    paths:
      - "README.md"                                               # project readme
      - "docs/user_guide/**/*.md"                                 # user guide

  # Decomposition Review (only one per repository)
  - id: Decomposition
    title: Review that NuGetInstaller Decomposition Addresses the Stated Purpose
    context:
      - "README.md"
      - "docs/user_guide/**/*.md"
    paths:
      - "requirements.yaml"                                       # root requirements file
      - "docs/design/introduction.md"                             # design introduction
      - "docs/sysml2/**/*.sysml"                                  # SysML2 model (authoritative structure)

  # NuGetInstaller-Architecture Review (one per system)
  - id: NuGetInstaller-Architecture
    title: Review that NuGetInstaller Architecture Satisfies Requirements
    context:
      - "README.md"
      - "docs/user_guide/**/*.md"
    paths:
      - "docs/reqstream/nuget-installer.yaml"                     # system requirements
      - "docs/design/introduction.md"                             # design introduction
      - "docs/design/nuget-installer.md"                          # system design
      - "docs/verification/introduction.md"                       # verification introduction
      - "docs/verification/nuget-installer.md"                    # system verification design
      - "test/**/IntegrationTests.cs"                             # system integration tests
      - "test/**/AssemblyInfo.cs"                                 # test infrastructure
      - "test/**/Runner.cs"                                       # test infrastructure

  # NuGetInstaller-Design Review (one per system)
  - id: NuGetInstaller-Design
    title: Review that NuGetInstaller Design is Consistent and Complete
    context:
      - "docs/reqstream/nuget-installer.yaml"
    paths:
      - "docs/reqstream/nuget-installer/platform-requirements.yaml"  # platform requirements
      - "docs/design/introduction.md"                             # design introduction
      - "docs/design/nuget-installer.md"                          # system design overview
      - "docs/design/nuget-installer/**/*.md"                     # all system design documents
      - "docs/verification/introduction.md"                       # verification introduction
      - "docs/verification/ots.md"                                # OTS verification overview

  # NuGetInstaller-Verification Review (one per system)
  - id: NuGetInstaller-Verification
    title: Review that NuGetInstaller Verification is Consistent and Complete
    context:
      - "docs/reqstream/nuget-installer.yaml"
    paths:
      - "docs/verification/introduction.md"                       # verification introduction
      - "docs/verification/nuget-installer.md"                    # system verification overview
      - "docs/verification/nuget-installer/**/*.md"               # all verification documents
      - "docs/verification/ots.md"                                # OTS verification overview

  # NuGetInstaller-AllRequirements Review (one per system)
  - id: NuGetInstaller-AllRequirements
    title: Review that All NuGetInstaller Requirements are Complete
    context:
      - "docs/design/nuget-installer.md"
      - "docs/reqstream/nuget-installer.yaml"
    paths:
      - "requirements.yaml"                                       # root requirements file
      - "docs/reqstream/**/*.yaml"                                # all requirements files

  # NuGetInstaller-Program Review (one per unit directly under the system)
  - id: NuGetInstaller-Program
    title: Review that NuGetInstaller Program Implementation is Correct
    context:
