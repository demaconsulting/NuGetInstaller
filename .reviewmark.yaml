      - "test/**/SelfTest/ValidationTests.cs"

  # NuGetInstaller-Utilities-PathHelpers Review (one per unit)
  - id: NuGetInstaller-Utilities-PathHelpers
    title: Review that NuGet Installer Utilities PathHelpers Implementation is Correct
    paths:
