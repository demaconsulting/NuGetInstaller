---
# CodeQL configuration for NuGet Installer
# Suppresses intentional generic catch clauses

name: "NuGet Installer CodeQL Config"

# Query filters to disable specific queries for certain paths
query-filters:
  - exclude:
      id: cs/catch-of-all-exceptions
    paths:
      - src/DemaConsulting.NuGetInstaller/Context.cs
      - src/DemaConsulting.NuGetInstaller/Validation.cs
  # Exclude path-combine warnings in PathHelpers (validated safe usage)
  - exclude:
      id: cs/path-combine
    paths:
      - src/DemaConsulting.NuGetInstaller/PathHelpers.cs
